<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kalender Event | PNS Pemkot Makassar 2024 | by Dedy A Muzawwir</title>
    <link rel="icon" href="https://makassarkota.go.id/wp-content/uploads/2024/02/logo-makassarkota-817x1024.png" type="image/x-icon">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- jQuery & FontAwesome -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Google Fonts (Permanent Marker untuk Pop Punk vibe, Montserrat untuk UI teks) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --punk-pink: #ff007f;
            --punk-cyan: #00f0ff;
            --punk-purple: #9d00ff;
            --punk-yellow: #ffea00;
            --punk-dark: #110e15;
        }

        body {
            background: url('https://images.unsplash.com/photo-1643022040583-b4be6de7fbf6?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3') no-repeat center center/cover;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding-bottom: 100px;
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow-x: hidden;
            background-color: var(--punk-dark);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(17,14,21,0.4) 0%, rgba(17,14,21,0.85) 100%);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: -2;
        }

        /* Manga Panel Overlay Texture */
        .bg-manga-texture {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.08;
            background-image: linear-gradient(45deg, #000 25%, transparent 25%), linear-gradient(-45deg, #000 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #000 75%), linear-gradient(-45deg, transparent 75%, #000 75%);
            background-size: 20px 20px;
            z-index: -1;
            pointer-events: none;
        }

        /* HEADER POP PUNK BANNER */
        .header-section {
            background: var(--punk-dark);
            border-bottom: 4px solid var(--punk-pink);
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.3);
            width: 100%;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 0;
        }

        .header-section h2 {
            font-family: 'Permanent Marker', cursive;
            font-size: 2.3rem;
            margin: 0;
            color: #fff;
            text-shadow: 3px 3px var(--punk-cyan);
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .header-section p {
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin: 5px 0 0;
            color: var(--punk-yellow);
            letter-spacing: 1px;
        }

        .logo-container img {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo-container:hover img {
            transform: scale(1.15) rotate(-8deg);
        }

        .no-style {
            background: transparent;
            color: inherit;
            text-decoration: none;
            display: inline-block;
        }

        /* CONTAINER BOX DESIGN */
        .punk-container {
            background: rgba(17, 14, 21, 0.85);
            border: 3px dashed var(--punk-purple);
            border-radius: 0px;
            padding: 25px;
            margin-top: 30px;
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.2);
            width: 100%;
            max-width: 900px;
        }

        /* SEARCH INPUT PUNK STYLE */
        .form-control {
            background: var(--punk-dark);
            border: 3px solid var(--punk-cyan);
            color: white !important;
            border-radius: 0px;
            padding: 12px;
            font-weight: 600;
            box-shadow: 4px 4px 0px var(--punk-pink);
            margin-bottom: 25px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .form-control:focus {
            background: var(--punk-dark);
            border-color: var(--punk-yellow);
            box-shadow: 4px 4px 0px var(--punk-purple);
            transform: translate(-2px, -2px);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }

        /* EVENT LIST CARD INJECTIONS (Gaya Kotak Kaku Komik) */
        /* Jika script.js menyuntikkan class .card, style ini akan memaksanya menjadi tema pop punk */
        #eventList .card {
            background: #221c28 !important;
            border: 2px solid #fff !important;
            border-radius: 0px !important;
            margin-bottom: 15px;
            box-shadow: 4px 4px 0px rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
            color: white;
        }

        #eventList .card:hover {
            border-color: var(--punk-pink) !important;
            box-shadow: 5px 5px 0px var(--punk-cyan) !important;
            transform: translate(-1px, -1px);
        }

        /* WIDGET SAWERIA STICKER */
        #saweria-widget {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #fff;
            border: 2px solid var(--punk-pink);
            padding: 6px 14px;
            border-radius: 0px;
            box-shadow: 4px 4px 0px var(--punk-dark);
            z-index: 9999;
            transition: all 0.2s ease;
            transform: rotate(-2deg);
        }

        #saweria-widget:hover {
            transform: scale(1.05) rotate(0deg);
            box-shadow: 2px 2px 0px var(--punk-dark);
        }

        #saweria-widget img {
            width: 32px;
            height: 32px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--punk-pink);
            background: #000;
        }

        #saweria-widget span {
            margin-left: 6px;
            font-size: 0.85rem;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* MODAL CUSTOM ANIME LOOK */
        .modal-content {
            background: var(--punk-dark);
            border: 4px solid var(--punk-purple);
            border-radius: 0px;
            color: white;
            box-shadow: 10px 10px 0px var(--punk-pink);
        }

        .modal-header {
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header h5 {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.6rem;
            color: var(--punk-cyan);
            text-shadow: 2px 2px #000;
        }

        .modal-body {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .btn-close {
            filter: invert(1) grayscale(1) brightness(2);
            opacity: 0.8;
        }

        /* FIREWORKS CANVAS */
        canvas#fireworksCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
            display: none;
        }

        @media (max-width: 576px) {
            .punk-container { padding: 15px; }
            .header-section h2 { font-size: 1.6rem; }
            #saweria-widget { bottom: 20px; left: 10px; }
        }
    </style>
</head>

<body>

    <!-- Background Manga Pattern Effect -->
    <div class="bg-manga-texture"></div>

    <!-- Canvas untuk kembang api -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- Header Banner -->
    <div class="header-section">
        <div class="logo-container mb-1">
            <a href="../pns-pemkot-mks-2024" class="no-style">
                <img title="Kembali ke Menu Utama" src="https://makassarkota.go.id/wp-content/uploads/2024/02/logo-makassarkota-817x1024.png" alt="Makassar Logo" width="55px">
            </a>
        </div>
        <h2>KALENDER EVENT</h2>
        <p>PNS Pemerintah Kota Makassar 2024</p>
    </div>

    <!-- Floating Saweria Widget -->
    <div id="saweria-widget">
        <a href="https://saweria.co/damz93" target="_blank" style="text-decoration: none;">
            <img src="https://www.pngplay.com/wp-content/uploads/12/Killua-Zoldyck-Transparent-Image.png" alt="Donasi">
            <span>Recehan Kak 💖</span>
        </a>
    </div>

    <!-- Main Calendar App Box -->
    <div class="container punk-container">
        <input type="text" id="searchInput" class="form-control" placeholder="Cari event seru PNS di sini... ⚡">
        <div id="eventList" class="mt-3 animate__animated animate__fadeIn">
            <!-- Elemen Card list event akan di-render via event/script.js -->
        </div>
    </div>

    <!-- Modal Detail Event -->
    <div class="modal fade" id="eventModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered modal-md">
            <div class="modal-content animate__animated animate__zoomIn">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Detail Event</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="modalDescription" class="mb-3"></p>
                    <p id="modalTime" style="color: var(--punk-yellow); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- JS Loader Scripts -->
    <script src="event/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
