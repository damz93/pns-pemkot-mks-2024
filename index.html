<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segala Hal Tentang PNS Pemkot MKS 2024 | By Dedy A Muzawwir</title>
    <link rel="icon" href="https://makassarkota.go.id/wp-content/uploads/2024/02/logo-makassarkota-817x1024.png" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/js/all.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Permanent+Marker&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --punk-pink: #ff007f;
            --punk-cyan: #00f0ff;
            --punk-purple: #9d00ff;
            --punk-yellow: #ffea00;
            --punk-dark: #110e15;
            --neon-glow: 0 0 10px rgba(255, 0, 127, 0.6), 0 0 20px rgba(255, 0, 127, 0.4);
        }

        body {
            /* Ganti Unsplash dengan background bertema manga/pop-punk jika ada, atau biarkan overlay gelap */
            background: url('https://images.unsplash.com/photo-1643022040583-b4be6de7fbf6?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3') no-repeat center center/cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-bottom: 100px;
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow-x: hidden;
            background-color: var(--punk-dark);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(17,14,21,0.4) 0%, rgba(17,14,21,0.85) 100%);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: -2;
        }

        /* Manga Panel Overlay Concept */
        .bg-manga-texture {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.08;
            background-image: linear-gradient(45deg, #000 25%, transparent 25%), linear-gradient(-45deg, #000 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #000 75%), linear-gradient(-45deg, transparent 75%, #000 75%);
            background-size: 20px 20px;
            z-index: -1;
            pointer-events: none;
        }

        /* Header Logo Animation */
        .logo-container img {
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.5));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo-container scale:hover img {
            transform: scale(1.1) rotate(-5deg);
        }

        /* SPEECH BUBBLE PUNK STYLE */
        .punk-bubble {
            position: relative;
            font-family: 'Permanent Marker', cursive;
            padding: 15px 30px;
            background: var(--punk-dark);
            border: 3px solid var(--punk-cyan);
            border-radius: 0px; /* Pop punk tends to use sharp geometric/sticker bounds */
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 2px 2px var(--punk-pink);
            box-shadow: 5px 5px 0px var(--punk-pink);
            animation: punkFloat 3s infinite ease-in-out;
            letter-spacing: 1px;
            transform: rotate(-1deg);
        }

        .punk-bubble::after {
            content: "";
            position: absolute;
            bottom: -15px;
            left: 75%;
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 15px solid var(--punk-cyan);
        }

        /* MENU TILES ARCHITECTURE */
        .punk-grid-container {
            background: rgba(17, 14, 21, 0.75);
            border: 3px dashed var(--punk-purple);
            border-radius: 0px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.2);
            margin-top: 25px;
        }

        .punk-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            height: 150px;
            position: relative;
            overflow: hidden;
            border: 3px solid #fff;
            transition: all 0.25s cubic-bezier(0.165, 0.84, 0.44, 1);
            font-weight: 600;
        }

        /* Sticker/Border overlap effect on hover */
        .punk-tile:hover {
            transform: translateY(-5px) scale(1.02) rotate(1deg);
            color: #fff;
            box-shadow: 7px 7px 0px #fff;
        }

        .punk-tile i {
            font-size: 2.5rem;
            margin-bottom: 12px;
            text-shadow: 2px 2px #000;
            transition: transform 0.3s ease;
        }

        .punk-tile:hover i {
            transform: scale(1.2) rotate(-10deg);
        }

        .punk-tile span {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.95rem;
            text-align: center;
            letter-spacing: 0.5px;
            background: rgba(0,0,0,0.4);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Color Variations themed with Neon Cyber Punk-Pop palette */
        .tile-pink   { background: var(--punk-pink); border-color: var(--punk-cyan); box-shadow: 5px 5px 0px var(--punk-cyan); }
        .tile-cyan   { background: var(--punk-cyan); border-color: var(--punk-pink); box-shadow: 5px 5px 0px var(--punk-pink); color: #000; }
        .tile-cyan span { background: rgba(255,255,255,0.7); color: #000; }
        .tile-purple { background: var(--punk-purple); border-color: var(--punk-yellow); box-shadow: 5px 5px 0px var(--punk-yellow); }
        .tile-yellow { background: var(--punk-yellow); border-color: var(--punk-dark); box-shadow: 5px 5px 0px var(--punk-dark); color: #000; }
        .tile-yellow span { background: rgba(0,0,0,0.7); color: #fff; }
        .tile-dark   { background: #222; border-color: #444; opacity: 0.6; pointer-events: none; }

        /* WIDGET SAWERIA ANIME INTERACTIVE */
        #saweria-widget {
            position: fixed;
            top: 15px;
            left: 15px;
            background: #fff;
            border: 2px solid var(--punk-pink);
            padding: 6px 14px;
            border-radius: 0px;
            box-shadow: 4px 4px 0px var(--punk-dark);
            z-index: 9999;
            transition: all 0.2s ease;
            transform: rotate(-2deg);
        }

        #saweria-widget:hover {
            transform: scale(1.05) rotate(0deg);
            box-shadow: 2px 2px 0px var(--punk-dark);
        }

        #saweria-widget img {
            width: 32px;
            height: 32px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--punk-pink);
            background: #000;
        }

        #saweria-widget span {
            margin-left: 6px;
            font-size: 0.85rem;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* FOOTER GRUNGE MARQUEE */
        footer {
            background: var(--punk-dark);
            border-top: 4px solid var(--punk-pink);
            box-shadow: 0 -5px 15px rgba(255, 0, 127, 0.3);
        }

        /* NEW CUSTOM ANIMATIONS */
        @keyframes punkFloat {
            0% { transform: translateY(0px) rotate(-1deg); }
            50% { transform: translateY(-6px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(-1deg); }
        }

        @keyframes glitchEffect {
            0% { text-shadow: 2px 2px var(--punk-pink); }
            50% { text-shadow: -2px -2px var(--punk-cyan); }
            100% { text-shadow: 2px 2px var(--punk-pink); }
        }

        @media (max-width: 576px) {
            .punk-tile { height: 130px; }
            .punk-bubble { font-size: 1.3rem; }
            #saweria-widget { top: auto; bottom: 70px; left: 10px; } /* Reposition safely on mobile */
        }
    </style>
</head>
<body>

    <div class="bg-manga-texture"></div>

    <div class="container h-100 d-flex flex-column align-items-center" style="padding-top: 40px;">
        
        <div class="logo-container mb-2">
            <a href="https://damz93.github.io/pns-pemkot-mks-2024/">
                <img src="https://makassarkota.go.id/wp-content/uploads/2024/02/logo-makassarkota-817x1024.png" width="105" height="auto" alt="Logo Pemkot Makassar">
            </a>
        </div>

        <div class="punk-bubble animate__animated animate__jackInTheBox" id="typing-text"></div>

        <div id="saweria-widget">
            <a href="https://saweria.co/damz93" target="_blank" style="text-decoration: none;">
                <img src="https://www.pngplay.com/wp-content/uploads/12/Killua-Zoldyck-Transparent-Image.png" alt="Donasi Character">
                <span>Recehan Kak 💖</span>
            </a>
        </div>

        <div class="container punk-grid-container col-12 col-xl-10">
            <div class="row g-3 justify-content-center">
                
                <div class="col-6 col-sm-4 col-md-3">
                    <a href="https://damz93.github.io/pns-pemkot-mks-2024/data" class="punk-tile tile-pink">
                        <i class="fa-solid fa-user-ninja"></i>
                        <span>Daftar PNS</span>
                    </a>
                </div>

                <div class="col-6 col-sm-4 col-md-3">
                    <a href="https://damz93.github.io/pns-pemkot-mks-2024/event" class="punk-tile tile-cyan">
                        <i class="fa-solid fa-bolt"></i>
                        <span>Kalender Event</span>
                    </a>
                </div>

                <div class="col-6 col-sm-4 col-md-3">
                    <a href="https://damz93.github.io/pns-pemkot-mks-2024/faq" class="punk-tile tile-purple">
                        <i class="fa-solid fa-headset"></i>
                        <span>FAQ</span>
                    </a>
                </div>

                <div class="col-6 col-sm-4 col-md-3">
                    <a href="https://damz93.github.io/pns-pemkot-mks-2024/istilah" class="punk-tile tile-yellow">
                        <i class="fa-solid fa-book-skull"></i>
                        <span>Istilah</span>
                    </a>
                </div>

                </div>
        </div>
    </div>

    <div style="position: fixed; bottom: 45px; width: 100%; z-index: -1; opacity: 0.2;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
            <path fill="#ff007f" d="M0,96L48,112C96,128,192,160,288,186.7C384,213,480,235,576,213.3C672,192,768,128,864,117.3C960,107,1056,149,1152,154.7C1248,160,1344,128,1392,112L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <footer class="text-white text-center fixed-bottom d-flex align-items-center justify-content-center" style="height: 50px;">
        <marquee id="marqueeText" behavior="scroll" direction="left" 
                 onmouseover="this.stop();" onmouseout="this.start();" 
                 class="w-100" style="font-size: 0.95rem; font-weight: 600; letter-spacing: 1px; color: var(--punk-cyan);">
            Memuat informasi...
        </marquee>
    </footer>

    <script>
        const text = "Cari apaki, ces? 🔥";
        let index = 0;
        const speed = 100;
        function typeEffect() {
            if (index < text.length) {
                document.getElementById("typing-text").innerHTML += text.charAt(index);
                index++;
                setTimeout(typeEffect, speed);
            }
        }
        window.onload = typeEffect;

        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSvEzh0Ps5yeM9uGO5vuubyRlI2ZQQXbBqIQ-r6pwWopnu3XkI5ajEvrK13cmLCa2UlfyJ4xrWMQDKs/pub?gid=598428421&single=true&output=csv";
    
        let messages = [];
        let currentIndex = 0;
    
        async function fetchSpreadsheetData() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                if (!data) throw new Error("CSV kosong atau tidak dapat diakses");
    
                const rows = data.split("\n").map(row => row.split(","));
                if (!rows || rows.length === 0) throw new Error("Format CSV tidak valid");
    
                messages = rows.map(row => {
                    const text = row[1]?.trim();
                    const author = row[2]?.trim();
                    return text && author ? `"${text}" - ${author}` : text;
                }).filter(text => text);
    
                if (messages.length > 0) {
                    currentIndex = Math.floor(Math.random() * messages.length);
                    document.getElementById("marqueeText").textContent = messages[currentIndex];
                } else {
                    document.getElementById("marqueeText").textContent = "Tidak ada data tersedia.";
                }
            } catch (error) {
                console.error("Gagal mengambil data:", error);
                document.getElementById("marqueeText").textContent = "Gagal memuat informasi.";
            }
        }
    
        function updateMarqueeText() {
            if (messages.length === 0) return;
            currentIndex = Math.floor(Math.random() * messages.length);
            document.getElementById("marqueeText").textContent = messages[currentIndex];
        }
    
        fetchSpreadsheetData();
        document.getElementById("marqueeText").addEventListener("animationiteration", updateMarqueeText);
        setInterval(fetchSpreadsheetData, 150000);
    </script>
</body>
</html>
